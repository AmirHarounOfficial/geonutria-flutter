# Lean JVM settings: this machine's commit limit (RAM + page file) is tight, so
# we cap the heap and use SerialGC (reserves far less virtual address space than
# the default G1, which otherwise fails to map its heap on a small page file).
org.gradle.jvmargs=-Xmx1536m -Xms256m -XX:+UseSerialGC -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m
org.gradle.daemon=false
org.gradle.workers.max=2
android.useAndroidX=true
# Project (D:) and the Pub cache (C:) live on different drives. Kotlin's
# incremental compiler cannot compute cross-drive relative paths on Windows
# (IllegalArgumentException: different roots), so disable it for this build.
kotlin.incremental=false
